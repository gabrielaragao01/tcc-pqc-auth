services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  benchmark:
    build: .
    volumes:
      - ./results:/app/results
      - ./data:/app/data
    env_file:
      - .env
    command: ["python", "-m", "benchmark.runner"]
    profiles:
      - benchmark
